groups:
  - name: heart_disease_alerts
    rules:
      - alert: HighInferenceLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High inference latency detected"
          description: "95th percentile latency: {{ $value }}s"

      - alert: HighErrorRate
        expr: rate(model_inference_errors_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High inference error rate"
          description: "Error rate: {{ $value }} errors/sec"

      - alert: HighCPUUsage
        expr: system_cpu_usage > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on serving server"
          description: "CPU usage: {{ $value }}%"
