global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'mlflow_exporter'
    static_configs:
      - targets: ['localhost:8000']
    metrics_path: /metrics
    scrape_interval: 5s

  - job_name: 'mlflow_tracking'
    static_configs:
      - targets: ['localhost:5000']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'mlflow_model_metrics'
    static_configs:
      - targets: ['localhost:8000']
    metrics_path: /model-metrics
    scrape_interval: 30s
