name: End-to-End ML Pipeline (Thyroid)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  preprocess:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: Install dependencies
        run: pip install pandas numpy scikit-learn joblib
      - name: Run Preprocessing
        run: python preprocessing/automate_Azzar-Budiyanto.py

  train:
    needs: preprocess
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn pandas numpy joblib
      - name: Run training
        run: |
          export MLFLOW_ALLOW_FILE_STORE=true
          # Run preprocessing in CI too just to ensure data is there
          python preprocessing/automate_Azzar-Budiyanto.py
          # Run MLflow Project
          mlflow run MLProject --env-manager=local 
