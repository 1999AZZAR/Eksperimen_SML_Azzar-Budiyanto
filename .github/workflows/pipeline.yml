name: End-to-End ML Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  preprocess:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: Install dependencies
        run: pip install pandas numpy scikit-learn joblib
      - name: Run Preprocessing
        run: python automate_Azzar-Budiyanto.py

  train:
    needs: preprocess
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn pandas numpy joblib
      - name: Run mlflow project
        run: |
          export MLFLOW_ALLOW_FILE_STORE=true
          mlflow run MLProject --env-manager=local 
      - name: Build Docker Model
        run: |
          RUN_ID=$(ls -td mlruns/0/*/ | head -n 1 | cut -d'/' -f3)
          mlflow models build-docker --model-uri \"runs:/$RUN_ID/model\" --name \"heart-disease-model\" --env-manager=local
